version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tf2hub_db
    restart: always
    environment:
      POSTGRES_USER: tf2user
      POSTGRES_PASSWORD: tf2password
      POSTGRES_DB: tf2hub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: tf2hub_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://tf2user:tf2password@db:5432/tf2hub_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: tf2hub_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
